version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: sme-postgres
    environment:
      POSTGRES_DB: smedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sme_pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: sme-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - sme_rabbitmq_data:/var/lib/rabbitmq

volumes:
  sme_pgdata:
  sme_rabbitmq_data:
