# Configuração Railway para o serviço Backend (Spring Boot)
# Este arquivo deve estar na raiz do contexto de build (pasta backend/)
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/instituicoes"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
