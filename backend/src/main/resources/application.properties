# Spring Boot - Sistema de Moeda Estudantil
spring.application.name=sistema-moeda-estudantil

# ══════════════════════════════════════
# Servidor (Render injeta $PORT em prod)
# ══════════════════════════════════════
server.port=${PORT:8080}

# ══════════════════════════════════════
# PostgreSQL (local para desenvolvimento)
# ══════════════════════════════════════
spring.datasource.url=jdbc:postgresql://localhost:5432/smedb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ══════════════════════════════════════
# JPA / Hibernate
# ══════════════════════════════════════
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# ══════════════════════════════════════
# JWT
# ══════════════════════════════════════
jwt.secret=${JWT_SECRET:sme-secret-key-dev-only-change-in-production-2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ══════════════════════════════════════
# Email (SMTP)
# ══════════════════════════════════════
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
mail.from=${MAIL_FROM:noreply@moedaestudantil.com}
mail.enabled=${MAIL_ENABLED:false}

# ══════════════════════════════════════
# RabbitMQ — suporta CLOUDAMQP_URL (prod) ou host individual (dev)
# ══════════════════════════════════════
spring.rabbitmq.addresses=${CLOUDAMQP_URL:amqp://${RABBITMQ_USER:guest}:${RABBITMQ_PASS:guest}@${RABBITMQ_HOST:localhost}:${RABBITMQ_PORT:5672}}
sme.rabbitmq.queue.email=sme.email.queue
sme.rabbitmq.exchange=sme.exchange
sme.rabbitmq.routing-key.email=sme.email.routing-key

