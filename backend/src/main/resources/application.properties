# Spring Boot - Sistema de Moeda Estudantil
spring.application.name=sistema-moeda-estudantil

# ══════════════════════════════════════
# H2 Database (Desenvolvimento)
# ══════════════════════════════════════
# spring.datasource.url=jdbc:h2:mem:smedb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# H2 Console (acessar via http://localhost:8080/h2-console)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ══════════════════════════════════════
# JPA / Hibernate
# ══════════════════════════════════════
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ══════════════════════════════════════
# Servidor
# ══════════════════════════════════════
server.port=8080

# ══════════════════════════════════════
# PostgreSQL (Produção - ativado)
# ══════════════════════════════════════
spring.datasource.url=jdbc:postgresql://localhost:5432/smedb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
