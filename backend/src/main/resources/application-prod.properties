# Perfil de Produção (Railway)
# ══════════════════════════════════════
# PostgreSQL via Railway (injeta DATABASE_URL)
# ══════════════════════════════════════
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SSL obrigatório para PostgreSQL no Railway
spring.datasource.hikari.data-source-properties.sslmode=require

# ══════════════════════════════════════
# RabbitMQ via CloudAMQP (free tier)
# Configure no Railway: CLOUDAMQP_URL=amqps://user:pass@hostname.cloudamqp.com/vhost
# ══════════════════════════════════════
spring.rabbitmq.addresses=${CLOUDAMQP_URL:amqp://guest:guest@localhost:5672}

# ══════════════════════════════════════
# Email (Gmail com App Password)
# ══════════════════════════════════════
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
mail.from=${MAIL_FROM:noreply@moedaestudantil.com}
mail.enabled=${MAIL_ENABLED:true}

# Menos SQL em prod
spring.jpa.show-sql=false
