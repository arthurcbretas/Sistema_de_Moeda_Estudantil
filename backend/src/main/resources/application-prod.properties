# Perfil de Produção (Render)
# ══════════════════════════════════════
# PostgreSQL via Render (propriedades individuais)
# Render fornece connectionString em formato postgres://
# que o Spring não aceita — montamos a URL JDBC manualmente
# ══════════════════════════════════════
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SSL preferido para PostgreSQL no Render (require causa EOF na rede interna)
spring.datasource.hikari.data-source-properties.sslmode=prefer

# ══════════════════════════════════════
# RabbitMQ via CloudAMQP (free tier — Little Lemur)
# Configure no Render Dashboard: CLOUDAMQP_URL=amqps://...
# ══════════════════════════════════════
spring.rabbitmq.addresses=${CLOUDAMQP_URL:amqp://guest:guest@localhost:5672}

# ══════════════════════════════════════
# Email (Gmail SMTP com App Password)
# Render NÃO bloqueia SMTP — funciona normalmente
# ══════════════════════════════════════
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
mail.from=${MAIL_FROM:noreply@moedaestudantil.com}
mail.enabled=${MAIL_ENABLED:true}

# Menos SQL em prod
spring.jpa.show-sql=false
